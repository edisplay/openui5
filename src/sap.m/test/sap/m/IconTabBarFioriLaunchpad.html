<!DOCTYPE HTML>
<html>
	<head>
		<title>sap.m.IconTabBar Fiori Lauchpad</title>
		<script src="shared-config.js"></script>
		<script src="../../../resources/sap-ui-core.js"
			id="sap-ui-bootstrap"
			data-sap-ui-compatVersion="edge"
			data-sap-ui-libs="sap.ui.core, sap.m, sap.f"
			data-sap-ui-async="true"
			data-sap-ui-compatVersion="edge"
			data-sap-ui-onInit="module:local/IconTabBarFioriLaunchpad"
			data-sap-ui-resourceroots='{
				"local": "./"
			}'>
		</script>
	</head>
	<body id="body" class="sapUiBody">
		<style>
			.myShellOverrides {
				--sapShell_Navigation_TextColor: red;
				--sapShell_Navigation_Selected_TextColor: yellow;
				--sapShell_Navigation_Background: orange;
				--sapShell_Navigation_SelectedColor: green;

				--sapShell_Navigation_Hover_Background: darkblue;
				--sapShell_Navigation_Active_TextColor: pink;
				--sapShell_Navigation_Active_Background: black;
			}
		</style>
	</body>
</html>
