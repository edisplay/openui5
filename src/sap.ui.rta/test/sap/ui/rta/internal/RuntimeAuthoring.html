<!DOCTYPE HTML>
<html>

<head>
	<title>RuntimeAuthoring - sap.ui.rta</title>

	<script>
		const basePath = document.location.pathname.match(/(.*)\/test-resources\//)[1];
		const script = document.createElement("script");
		script.src = `${window.location.origin}${basePath}/resources/sap-ui-core.js`;
		script.id = "sap-ui-bootstrap";
		script.setAttribute("data-sap-ui-language", "en");
		script.setAttribute("data-sap-ui-async", "true");
		script.setAttribute("data-sap-ui-compat-version", "edge");
		script.setAttribute("data-sap-ui-libs", "sap.m, sap.ui.layout, sap.ui.comp, sap.ui.rta");
		script.setAttribute("data-sap-ui-xx-bindingSyntax", "complex");
		script.setAttribute("data-sap-ui-resourceroots", '{"sap.ui.rta.test": "testdata/rta/"}');
		script.setAttribute("data-sap-ui-flexibilityServices", '[{"connector": "LocalStorageConnector"}]');
		script.setAttribute("data-sap-ui-onInit", "module:rta/internal/testdata/standalone_init");
		document.head.appendChild(script);
	</script>

	<style>
		.sapUiRtaMode .sapUiRtaRoot {
			margin-top: 3rem;
		}
	</style>
</head>

<body class="sapUiBody sapUiSizeCompact">
	<div id="content"></div>
</body>

</html>
