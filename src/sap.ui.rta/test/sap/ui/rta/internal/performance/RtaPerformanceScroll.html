<!DOCTYPE HTML>
<html>
	<head>
		<style>
			#content {
				margin-top: 50px;
				height: 1000px;
			}
		</style>

		<meta charset="utf-8">
		<title>Adaptation at Runtime - Apply Styles for Scroll Test</title>
		<script src="../../shared-config.js"></script>
		<script>
			window["sap-ui-config"] = window["sap-ui-config"] || {};
			window["sap-ui-config"].onInit = "module:rta/performance/scroll/main";
			window["sap-ui-config"].async = "true";
			window["sap-ui-config"].libs = "sap.ui.rta, sap.ui.dt, sap.m, sap.ui.layout, sap.ui.fl, sap.uxap";
			window["sap-ui-config"].resourceroots = {
				"rta.performance": "./",
				"dt.performance": "../../../../../sap/ui/dt/internal/performance/",
				"test-resources": "../../../../../../test-resources"
			};
			window["sap-ui-config"].flexibilityServices = '[{"connector": "SessionStorageConnector"}]';
			const basePath = document.location.pathname.match(/(.*)\/test-resources\//)[1];
			const script = document.createElement("script");
			script.src = `${window.location.origin}${basePath}/resources/sap-ui-core.js`;
			document.head.appendChild(script);
		</script>
		<script src="RtaPerformanceScroll.js"></script>
	</head>
	<body>
		<div id="content" class="sapUiBody"></div>
	</body>
</html>
